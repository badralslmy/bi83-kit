<svg viewBox="0 0 1200 260" width="1200" height="260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bi83-kit — plugin SDK for running Windows games emulation on macOS">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b10"/>
      <stop offset="45%" stop-color="#100b1a"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>

    <linearGradient id="titleGrad" gradientUnits="userSpaceOnUse" x1="380" y1="0" x2="800" y2="0">
      <stop offset="0%" stop-color="#4fd8ff"/>
      <stop offset="48%" stop-color="#c9b6ff"/>
      <stop offset="52%" stop-color="#f1e6ff"/>
      <stop offset="100%" stop-color="#ff53d6"/>
    </linearGradient>

    <linearGradient id="bridgeGrad" gradientUnits="userSpaceOnUse" x1="150" y1="0" x2="1050" y2="0">
      <stop offset="0%" stop-color="#39d6ff" stop-opacity="0.9"/>
      <stop offset="48%" stop-color="#b98bff" stop-opacity="0.95"/>
      <stop offset="52%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff4fd0" stop-opacity="0.9"/>
    </linearGradient>

    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#39d6ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#39d6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowMagenta" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff4fd0" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#ff4fd0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="softSm" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M 34 0 L 0 0 0 34" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>

    <style>
      .glow-a { animation: pulseA 5s ease-in-out infinite; transform-origin: 130px 128px; }
      .glow-b { animation: pulseB 6s ease-in-out infinite 0.4s; transform-origin: 1070px 128px; }
      .node   { animation: pulseNode 2.6s ease-in-out infinite; transform-origin: 600px 96px; }
      @keyframes pulseA { 0%,100% { opacity: 0.65; } 50% { opacity: 1; } }
      @keyframes pulseB { 0%,100% { opacity: 0.6; } 50% { opacity: 0.95; } }
      @keyframes pulseNode { 0%,100% { opacity: 0.75; r: 5px; } 50% { opacity: 1; r: 7px; } }
      @media (prefers-reduced-motion: reduce) {
        .glow-a, .glow-b, .node { animation: none; }
      }
      .title    { font-family: "Segoe UI", -apple-system, "SF Pro Display", Helvetica, Arial, sans-serif; font-weight: 800; }
      .subtitle { font-family: "Cascadia Code", "SF Mono", Consolas, "JetBrains Mono", monospace; }
      .caption  { font-family: "Cascadia Code", "SF Mono", Consolas, monospace; }
    </style>
  </defs>

  <!-- base -->
  <rect width="1200" height="260" fill="url(#bg)"/>
  <rect width="1200" height="260" fill="url(#grid)"/>
  <rect width="1200" height="260" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- ambient glows -->
  <circle class="glow-a" cx="130" cy="128" r="120" fill="url(#glowCyan)" filter="url(#soft)"/>
  <circle class="glow-b" cx="1070" cy="128" r="130" fill="url(#glowMagenta)" filter="url(#soft)"/>

  <!-- bridge line: guest (Windows) -> kit -> host (macOS), broken around the title so it doesn't cross the text -->
  <line x1="195" y1="130" x2="405" y2="130" stroke="url(#bridgeGrad)" stroke-width="1.6" opacity="0.8"/>
  <line x1="195" y1="130" x2="405" y2="130" stroke="url(#bridgeGrad)" stroke-width="6" opacity="0.18" filter="url(#softSm)"/>
  <line x1="795" y1="130" x2="1005" y2="130" stroke="url(#bridgeGrad)" stroke-width="1.6" opacity="0.8"/>
  <line x1="795" y1="130" x2="1005" y2="130" stroke="url(#bridgeGrad)" stroke-width="6" opacity="0.18" filter="url(#softSm)"/>

  <!-- left glyph: abstracted guest-OS module grid -->
  <g transform="translate(130,128) rotate(-8)">
    <rect x="-52" y="-52" width="46" height="46" rx="9" fill="none" stroke="#39d6ff" stroke-opacity="0.85" stroke-width="2.5"/>
    <rect x="6" y="-52" width="46" height="38" rx="9" fill="none" stroke="#39d6ff" stroke-opacity="0.6" stroke-width="2.5"/>
    <rect x="-52" y="6" width="38" height="46" rx="9" fill="none" stroke="#39d6ff" stroke-opacity="0.6" stroke-width="2.5"/>
    <rect x="-4" y="14" width="46" height="38" rx="9" fill="#39d6ff" fill-opacity="0.14" stroke="#39d6ff" stroke-opacity="0.9" stroke-width="2.5"/>
  </g>
  <text x="130" y="205" text-anchor="middle" class="caption" font-size="13" fill="#7fb8cf" opacity="0.75" letter-spacing="2">GUEST · WINDOWS</text>

  <!-- right glyph: abstracted host macOS window chrome -->
  <g transform="translate(1070,128)">
    <rect x="-62" y="-40" width="124" height="80" rx="14" fill="#ffffff" fill-opacity="0.03" stroke="#ff4fd0" stroke-opacity="0.75" stroke-width="2"/>
    <line x1="-62" y1="-16" x2="62" y2="-16" stroke="#ff4fd0" stroke-opacity="0.4" stroke-width="1.4"/>
    <circle cx="-46" cy="-28" r="4.5" fill="#ff4fd0" fill-opacity="0.85"/>
    <circle cx="-30" cy="-28" r="4.5" fill="#ff4fd0" fill-opacity="0.55"/>
    <circle cx="-14" cy="-28" r="4.5" fill="#ff4fd0" fill-opacity="0.3"/>
  </g>
  <text x="1070" y="205" text-anchor="middle" class="caption" font-size="13" fill="#e0a9d8" opacity="0.75" letter-spacing="2">HOST · MACOS</text>

  <!-- title: the SDK is the bridge -->
  <text x="585" y="128" text-anchor="end" class="title" font-size="66" fill="url(#titleGrad)">Bi83</text>
  <g class="node" transform="translate(600,106)">
    <circle r="16" fill="url(#nodeGlow)" opacity="0.6"/>
    <rect x="-7" y="-7" width="14" height="14" rx="3" transform="rotate(45)" fill="#f6f1ff"/>
    <line x1="0" y1="9" x2="0" y2="22" stroke="#f6f1ff" stroke-opacity="0.55" stroke-width="2"/>
  </g>
  <text x="615" y="128" text-anchor="start" class="title" font-size="66" fill="url(#titleGrad)">kit</text>

  <text x="600" y="164" text-anchor="middle" class="subtitle" font-size="17" fill="#93a0b5" letter-spacing="0.5">plugin sdk · windows game emulation runtime for macos</text>
</svg>
